name: Build Dex

on:
  push:
    branches: [ "master", "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew buildDex

    - name: Copy classes.dex to root
      run: cp build/dex/classes.dex .

    - name: Rename loader.py to loader.plugin
      run: cp loader.py loader.plugin

    - name: Upload Dev artifacts
      uses: actions/upload-artifact@v4
      with:
        name: re-extera-dev
        path: |
          classes.dex
          loader.plugin

    - name: Parse tag for release name
      id: parse_tag
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        WITHOUT_V=${TAG_NAME#v}
        PLUGIN_VER=${WITHOUT_V%-*}
        TG_VER=${WITHOUT_V#*-}
        echo "plugin=$PLUGIN_VER" >> $GITHUB_OUTPUT
        echo "tg=$TG_VER" >> $GITHUB_OUTPUT

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: re:extera v${{ steps.parse_tag.outputs.plugin }} for Telegram ${{ steps.parse_tag.outputs.tg }}
        files: |
          classes.dex
          loader.plugin
        generate_release_notes: true
